services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    volumes:
      - .:/app
      - go-cache:/go/pkg/mod

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    depends_on:
      - backend
    environment:
      API_PROXY_TARGET: http://backend:8080
      VITE_API_PROXY_TARGET: http://backend:8080
    ports:
      - "3000:3000"

volumes:
  go-cache:
