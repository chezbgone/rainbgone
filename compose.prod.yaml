# Clean production base.
# The frontend (SvelteKit/adapter-node) proxies /api -> backend internally,
# so both services share an `appnet` network and NO host ports are published.
services:
  backend:
    image: ghcr.io/chezbgone/rainbgone-backend:latest
    volumes:
      - ./.env:/app/.env:ro
    networks: [appnet]
    restart: unless-stopped

  frontend:
    image: ghcr.io/chezbgone/rainbgone-frontend:latest
    depends_on: [backend]
    environment:
      API_PROXY_TARGET: http://backend:8080
      PUBLIC_LIBREWXR_BASE_URL: https://api.librewxr.net
    networks: [appnet]
    restart: unless-stopped

networks:
  appnet:
