services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
      # Reuse the builder stage (Go toolchain + downloaded modules) instead of the final
      # distroless image, so the compose command below can compile from live source.
      target: builder
    # Recompile from the bind-mounted source on every container start (parallel to the
    # frontend's `npm ci` on start, see frontend/Dockerfile). Without this, `docker compose
    # up` re-runs whatever binary was baked in at the last `--build`, silently ignoring any
    # backend source changes made since.
    command: ["go", "run", "."]
    working_dir: /src
    ports:
      - "8080:8080"
    volumes:
      - .:/src
      - backend-go-build-cache:/root/.cache/go-build

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: dev
    depends_on:
      - backend
    environment:
      API_PROXY_TARGET: http://backend:8080
      VITE_API_PROXY_TARGET: http://backend:8080
      # Override to point the radar overlay at a self-hosted LibreWXR instance.
      PUBLIC_LIBREWXR_BASE_URL: https://api.librewxr.net
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - frontend-node-modules:/app/node_modules

volumes:
  frontend-node-modules:
  backend-go-build-cache:
