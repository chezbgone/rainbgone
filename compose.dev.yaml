services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    volumes:
      - ./.env:/app/.env:ro

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: dev
    depends_on:
      - backend
    environment:
      API_PROXY_TARGET: http://backend:8080
      VITE_API_PROXY_TARGET: http://backend:8080
      # Override to point the radar overlay at a self-hosted LibreWXR instance.
      PUBLIC_LIBREWXR_BASE_URL: https://api.librewxr.net
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - frontend-node-modules:/app/node_modules

volumes:
  frontend-node-modules:
